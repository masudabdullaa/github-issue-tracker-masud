<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github issue tracker</title>

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="./style/index.css">
</head>

<body>
    <div class="min-h-[742px] max-w-[520px] bg-white mx-auto shadow-xl pt-8 rounded-xl my-20">

        <div class="p-8 space-y-4 mx-auto ">

            <div class="logo w-[100px] mx-auto">
                <img src="./assets/github-logo.png" alt="">
            </div>

            <div class="text-center">
                <h2 class="font-semibold text-xl">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>

            </div>
            <div class="form pt-10">
                <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto">
                    <div class="card-body">
                        <fieldset class="fieldset">
                            <label class="label font-semibold">Username</label>
                            <input type="email" id="input-username" class="input" placeholder="Enter Username" />
                            <p class="text-blue-800">Default: admin</p>
                            <br>
                            <label class="label font-semibold">Password</label>
                            <input id="input-password" type="password" class="input" placeholder="Enter Password" />
                            <span class="text-blue-800 left-0">Default: admin123</span>
                            <button id="login-btn" class="btn btn-primary mt-4">Login</button>
                        </fieldset>
                    </div>
                </div>
            </div>


            <p class="text-center">OR</p>
            <p class="text-[#64748B] text-center">Demo Credentials:</p>

            <div class="text-center">
                <h3 class="font-semibold">Username: <span class="font-light">admin</span>
                </h3>
                <h3 class="font-semibold">Password: <span class="font-light">admin123</span>
                </h3>

            </div>

        </div>

    </div>





    <script src="./js/index.js"></script>
</body>

</html>
