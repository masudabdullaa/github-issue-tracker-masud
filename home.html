<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github issue tracker</title>

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="./style/index.css">

</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm justify-between flex flex-wrap">
            <div class="flex items-center">
                <a href="http://127.0.0.1:5500/home.html"><img class="w-[50px]" src="./assets/github-logo.png"
                        alt=""></a>
                <a href="http://127.0.0.1:5500/home.html" class="text-xl ml-2">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <div class="input input-bordered w-24 md:w-auto">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search issues" />
                </div>
                <button id="search-issue" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1110px] mx-auto space-y-5 shadow-sm mt-10 p-5 rounded-xl">
        <div class="container-header flex items-center space-x-5 shadow-sm p-5">
            <button onclick="loadIssues('all')" id="btn-all"
                class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl">All</button>
            <div id="categoryContainer" class="space-x-5">
                <button onclick="loadIssues('open')" id="btn-open"
                    class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl">Open</button>
                <button onclick="loadIssues('closed')" id="btn-closed"
                    class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl">Closed</button>
            </div>
        </div>
        <div class="issues-container flex flex-wrap items-center justify-between p-5 shadow-sm">
            <div class="flex items-center space-x-4">
                <img class=" border-8 border-slate-200 rounded-full" src="./assets/Aperture.png" alt="">
                <div>
                    <h2 class="font-semibold text-xl"><span id="issue-count">0</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center space-x-4 p-5">
                <a class="" href=""><i class="fa-solid fa-circle text-green-600"></i> Open</a>
                <a class="" href=""><i class="fa-solid fa-circle text-violet-400"></i> Closed</a>
            </div>
        </div>
        <div id="issue-card-container" class="grid grid-cols-1 sm:grid-cols-4 gap-5">
            <!-- all cards will dinamically display here using JS API -->
        </div>

        <!-- Open the modal using ID.showModal() method -->
        <dialog id="issue_details_modal" class="modal p-3">
            <div class="modal-box">

                <div class="rounded-lg p-3 space-y-5 h-full">
                    <h2 id="modal-title" class="font-bold text-xl">title </h2>
                    <div class="flex items-center gap-5">
                        <p id="modal-status">status</p>
                        <ul>
                            <li><span id="modal-status">opened </span>by <span id="modal-author">assigned name</span>
                            </li>
                            <li id="modal-createdDate">created date</li>
                        </ul>
                    </div>
                    <div class="flex items-center space-x-5">
                        <button class="btn btn-outline btn-secondary rounded-full">BUG</button>
                        <button class="btn btn-outline btn-warning rounded-full">HELP WANTED</button>
                    </div>
                    <p id="modal-description" class="text-gray-500 line-clamp-2">issue description</p>
                    <div class="flex items-center gap-20">
                        <div>
                            <p class="text-lg">assignee:</p>
                            <p id="modal-authors">assigned name:</p>
                        </div>
                        <div>
                            <p>Priority</p>
                            <button id="modal-priority" class=" rounded-full px-5 btn-primary">priority</button>
                        </div>
                    </div>
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary rounded-lg">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>
    <script src="./js/home.js"></script>
</body>

</html>
