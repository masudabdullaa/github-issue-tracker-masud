<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github issue tracker</title>

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="./style/index.css">

</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm justify-between flex flex-wrap">
            <div class="flex items-center">
                <a href="http://127.0.0.1:5500/home.html"><img class="w-[50px]" src="./assets/github-logo.png"
                        alt=""></a>
                <a href="http://127.0.0.1:5500/home.html" class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <div class="input input-bordered w-24 md:w-auto">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search issues" />
                </div>
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>

    <script src="./js/home.js"></script>
</body>

</html>
